<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#17161d" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KET单词" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Dark mode follows the system appearance
      const mq = window.matchMedia('(prefers-color-scheme: dark)')
      const applyDark = () => document.documentElement.classList.toggle('dark', mq.matches)
      applyDark()
      mq.addEventListener('change', applyDark)
    </script>
    <title>KET 单词</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
